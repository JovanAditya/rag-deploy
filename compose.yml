services:
  # 1. Reverse Proxy (Nginx)
  nginx-proxy:
    image: nginx:stable-alpine
    container_name: rag-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - API_SECRET_KEY=${API_SECRET_KEY}
      - APP_URL=${APP_URL}
      - API_URL=${API_URL}
    volumes:
      - ./docker/nginx.prod.conf:/tmp/default.conf:ro
    command: /bin/sh -c "cp /tmp/default.conf /etc/nginx/conf.d/default.conf && export APP_DOMAIN=$$(echo $$APP_URL | sed -e 's|^[^/]*//||' -e 's|/.*||') && export API_DOMAIN=$$(echo $$API_URL | sed -e 's|^[^/]*//||' -e 's|/.*||') && sed -i 's/__API_SECRET_KEY__/'\"$$API_SECRET_KEY\"'/g' /etc/nginx/conf.d/default.conf && sed -i 's/__APP_URL__/'\"$$APP_DOMAIN\"'/g' /etc/nginx/conf.d/default.conf && sed -i 's/__API_URL__/'\"$$API_DOMAIN\"'/g' /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - frontend
      - backend

  # 2. RAG API (FastAPI)
  rag-api:
    build:
      context: ./rag-api
      dockerfile: Dockerfile
    container_name: rag-api-prod
    restart: unless-stopped
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - EMBEDDING_DEVICE=cpu
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma_db
      - INDEX_CACHE_DIR=/app/data/cache
      - BM25_CACHE_DIR=/app/data/bm25_cache
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - backend

  # 3. Laravel Web Application
  rag-web:
    build:
      context: ./rag-web
      dockerfile: Dockerfile
    container_name: rag-web-prod
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - RAG_API_URL=http://rag-api:5001/v1
    volumes:
      - ./data:/var/www/data
    depends_on:
      - rag-api
      - mysql
    networks:
      - frontend
      - backend

  # 4. MySQL Database
  mysql:
    image: mysql:8.0
    container_name: rag-mysql-prod
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=academic_rag
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    networks:
      - backend

networks:
  frontend:
    external: true
  backend:
    external: true

volumes:
  mysql_prod_data:
    driver: local
